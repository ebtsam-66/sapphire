<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"/>
    <link rel="icon" href="images/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <title>Contact Us - Sapphire</title>
</head>  

<body>

    <header>
        <h1 class="logoname">Sapphire</h1>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="quiz.html">Quiz</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </header>  

  
    <nav class="nav">
        <a href="index.html" class="logo">
            <img src="images/logo.png" alt="Logo">
        </a>
        <form class="search">
            <input type="text" placeholder="Search Product Here" required />
            <button><i class="fa-solid fa-magnifying-glass"></i></button>
        </form>
        <div class="nav-btns">
            <a href="#" class="nav-user"><i class="fa-solid fa-user"></i></a>
            <a href="#" class="nav-cart"><i class="fa-solid fa-cart-arrow-down"></i></a>
        </div>
    </nav>

    <!-- CONTACT CONTENT -->
    <section class="contact-section">
        <h2 class="page-title">Get In Touch</h2>
        <p>Have a question or feedback? We'd love to hear from you.</p>

        <div class="contact-container">
            <!-- Contact Form -->
            <div class="contact-form">
                <form>
                    <input type="text" placeholder="Your Name" required>
                    <input type="email" placeholder="Your Email" required>
                    <input type="text" placeholder="Subject">
                    <textarea placeholder="Your Message" rows="5" required></textarea>
                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>

            <!-- Contact Info -->
            <div class="contact-info">
                <div class="info-box">
                    <i class="fa-solid fa-location-dot"></i>
                    <div>
                        <h4>Address</h4>
                        <p>123 Skincare Street, Cairo, Egypt</p>
                    </div>
                </div>
                <div class="info-box">
                    <i class="fa-solid fa-phone"></i>
                    <div>
                        <h4>Phone</h4>
                        <p>+20 123 456 7890</p>
                    </div>
                </div>
                <div class="info-box">
                    <i class="fa-solid fa-envelope"></i>
                    <div>
                        <h4>Email</h4>
                        <p>support@sapphire.com</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
